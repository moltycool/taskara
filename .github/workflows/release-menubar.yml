name: Release Menubar

on:
  push:
    tags:
      - 'menubar-v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build menubar
        run: bun run build:menubar

      - name: Publish GitHub release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/menubar/release/*.dmg
            apps/menubar/release/*.zip
            apps/menubar/release/*.blockmap
          generate_release_notes: true
